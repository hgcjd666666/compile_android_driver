name: Build Kernel Module for Specific KMI

on:
  workflow_call:
    inputs:
      kmi:
        description: 'KMI version (e.g., android14-6.1)'
        required: true
        type: string
      ddk_release:
        description: 'DDK release version'
        required: false
        default: '20260313'
        type: string
      source_dir:
        description: 'Directory containing module source (relative to repo root)'
        required: false
        default: 'code'
        type: string

jobs:
  build:
    name: Build for ${{ inputs.kmi }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ylarod/ddk-min:${{ inputs.kmi }}-${{ inputs.ddk_release }}
      options: --privileged

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Prepare module source
        run: |
          mkdir -p /workspace/module
          cp -r "$GITHUB_WORKSPACE/${{ inputs.source_dir }}"/* /workspace/module/
          git config --global --add safe.directory /workspace/module

      - name: Extract module names
        id: get_modules
        run: |
          cd /workspace/module
          MODULES=$(grep -E '^obj-m\s*\+?=' Makefile | sed -E 's/.*=\s*//; s/\.o//g' | tr '\n' ' ')
          MODULES=$(echo "$MODULES" | xargs)
          if [ -z "$MODULES" ]; then
            echo "Error: No obj-m entries found in Makefile" >&2
            exit 1
          fi
          echo "modules=$MODULES" >> $GITHUB_OUTPUT
          echo "Found modules: $MODULES"

      - name: Build kernel modules
        run: |
          cd /workspace/module
          echo "=== Building all modules for KMI: ${{ inputs.kmi }} ==="
          make
          echo "=== Build completed ==="
          for mod in ${{ steps.get_modules.outputs.modules }}; do
            if [ ! -f "${mod}.ko" ]; then
              echo "Error: ${mod}.ko not found!" >&2
              ls -la
              exit 1
            fi
            echo "OK: ${mod}.ko"
          done

      - name: Strip and copy artifacts
        run: |
          mkdir -p "$GITHUB_WORKSPACE/out"
          cd /workspace/module
          for mod in ${{ steps.get_modules.outputs.modules }}; do
            llvm-strip -d "${mod}.ko"
            OUTPUT="${{ inputs.kmi }}_${mod}.ko"
            cp "${mod}.ko" "$GITHUB_WORKSPACE/out/$OUTPUT"
            echo "Artifact: $OUTPUT ($(du -h "$GITHUB_WORKSPACE/out/$OUTPUT" | cut -f1))"
          done

      - name: Upload all module artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.kmi }}-modules
          path: ${{ github.workspace }}/out/*.ko
