name: Build Kernel Module for Specific KMI

on:
  workflow_call:
    inputs:
      kmi:
        description: 'KMI version (e.g., android14-6.1)'
        required: true
        type: string
      ddk_release:
        description: 'DDK release version (used to select container tag)'
        required: false
        default: '20251104'
        type: string
      source_dir:
        description: 'Directory containing module source and Makefile (relative to repo root)'
        required: false
        default: 'code'
        type: string
      module_name:
        description: 'Explicit module name (if empty, will be parsed from Makefile)'
        required: false
        type: string

jobs:
  build:
    name: Build for ${{ inputs.kmi }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ylarod/ddk:${{ inputs.kmi }}-${{ inputs.ddk_release }}
      options: --privileged

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Prepare module source inside container
        run: |
          # 将源码目录复制到容器内的构建目录
          mkdir -p /workspace/module
          cp -r "$GITHUB_WORKSPACE/${{ inputs.source_dir }}"/* /workspace/module/
          # 设置安全目录（避免 git 权限问题）
          git config --global --add safe.directory /workspace/module

      - name: Determine module name (if not provided)
        id: get_modname
        run: |
          if [ -n "${{ inputs.module_name }}" ]; then
            echo "MODULE_NAME=${{ inputs.module_name }}" >> $GITHUB_ENV
          else
            # 从 Makefile 中提取 obj-m 指定的模块名（取第一个）
            cd /workspace/module
            MODULE=$(grep -E '^obj-m\s*\+?=' Makefile | head -1 | sed -E 's/.*=\s*([^ ]+).*/\1/' | sed 's/\.o$//')
            if [ -z "$MODULE" ]; then
              echo "Error: Could not parse module name from Makefile" >&2
              exit 1
            fi
            echo "MODULE_NAME=$MODULE" >> $GITHUB_ENV
          fi

      - name: Build kernel module
        run: |
          cd /workspace/module
          echo "=== Building $MODULE_NAME.ko for KMI: ${{ inputs.kmi }} ==="
          # 使用容器内预设的环境变量（如 CC、ARCH 等）进行编译
          make
          echo "=== Build completed ==="

          # 检查模块是否生成
          if [ ! -f "$MODULE_NAME.ko" ]; then
            echo "Error: $MODULE_NAME.ko not found!" >&2
            exit 1
          fi

      - name: Strip debug symbols (optional)
        run: |
          cd /workspace/module
          llvm-strip -d "$MODULE_NAME.ko"
          echo "Stripped size: $(du -h "$MODULE_NAME.ko" | cut -f1)"

      - name: Copy and rename artifact
        run: |
          mkdir -p "$GITHUB_WORKSPACE/out"
          OUTPUT_NAME="${{ inputs.kmi }}_${MODULE_NAME}.ko"
          cp "/workspace/module/${MODULE_NAME}.ko" "$GITHUB_WORKSPACE/out/$OUTPUT_NAME"
          echo "Artifact ready: $OUTPUT_NAME"

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.kmi }}-${{ env.MODULE_NAME }}.ko
          path: ${{ github.workspace }}/out/${{ inputs.kmi }}_${{ env.MODULE_NAME }}.ko
