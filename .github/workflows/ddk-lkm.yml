name: Build Kernel Module for Specific KMI

on:
  workflow_call:
    inputs:
      kmi:
        description: 'KMI version (e.g., android14-6.1)'
        required: true
        type: string
      ddk_release:
        description: 'DDK release version'
        required: false
        default: '20260313'
        type: string
      source_dir:
        description: 'Directory containing module source (relative to repo root)'
        required: false
        default: 'code'
        type: string
      module_name:
        description: 'Explicit module name (auto-detected from Makefile if empty)'
        required: false
        type: string

jobs:
  build:
    name: Build for ${{ inputs.kmi }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ylarod/ddk-min:${{ inputs.kmi }}-${{ inputs.ddk_release }}
      options: --privileged

    outputs:
      module_name: ${{ steps.get_modname.outputs.module_name }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Prepare module source
        run: |
          mkdir -p /workspace/module
          cp -r "$GITHUB_WORKSPACE/${{ inputs.source_dir }}"/* /workspace/module/
          git config --global --add safe.directory /workspace/module

      - name: Determine module name
        id: get_modname
        run: |
          if [ -n "${{ inputs.module_name }}" ]; then
            echo "module_name=${{ inputs.module_name }}" >> $GITHUB_OUTPUT
          else
            cd /workspace/module
            MODULE=$(grep -E '^obj-m\s*\+?=' Makefile | head -1 | sed -E 's/.*=\s*([^ ]+)\.o/\1/' | sed 's/.*=\s*//')
            if [ -z "$MODULE" ]; then
              echo "Error: Could not parse module name from Makefile" >&2
              exit 1
            fi
            echo "module_name=$MODULE" >> $GITHUB_OUTPUT
          fi

      - name: Build kernel module
        run: |
          MODULE_NAME=${{ steps.get_modname.outputs.module_name }}
          cd /workspace/module
          echo "=== Building $MODULE_NAME.ko for KMI: ${{ inputs.kmi }} ==="
          make
          echo "=== Build completed ==="
          if [ ! -f "$MODULE_NAME.ko" ]; then
            echo "Error: $MODULE_NAME.ko not found!" >&2
            ls -la
            exit 1
          fi

      - name: Strip debug symbols
        run: |
          MODULE_NAME=${{ steps.get_modname.outputs.module_name }}
          cd /workspace/module
          llvm-strip -d "$MODULE_NAME.ko"
          echo "Stripped size: $(du -h "$MODULE_NAME.ko" | cut -f1)"

      - name: Copy and rename artifact
        run: |
          MODULE_NAME=${{ steps.get_modname.outputs.module_name }}
          mkdir -p "$GITHUB_WORKSPACE/out"
          OUTPUT_NAME="${{ inputs.kmi }}_${MODULE_NAME}.ko"
          cp "/workspace/module/${MODULE_NAME}.ko" "$GITHUB_WORKSPACE/out/$OUTPUT_NAME"
          echo "Artifact ready: $OUTPUT_NAME"

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.kmi }}-${{ steps.get_modname.outputs.module_name }}.ko
          path: ${{ github.workspace }}/out/${{ inputs.kmi }}_${{ steps.get_modname.outputs.module_name }}.ko
